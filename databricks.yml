bundle:
  name: crm-revenue-intelligence

variables:
  env:
    default: dev
  project_root:
    default: /Workspace/Repos/dev/crm-revenue-intelligence
  spark_version:
    default: "15.4.x-scala2.12"
  node_type_id:
    default: "Standard_DS3_v2"

resources:
  jobs:
    wf_crm_sales_current_pipeline:
      name: wf_crm_sales_current_pipeline_${bundle.target}
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0/10 * * * ?"
        timezone_id: "Asia/Kolkata"
        pause_status: PAUSED
      job_clusters:
        - job_cluster_key: crm_pipeline_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            autoscale:
              min_workers: 2
              max_workers: 6
            spark_conf:
              spark.databricks.delta.schema.autoMerge.enabled: "true"
      tasks:
        - task_key: bronze_opportunity
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_bronze.py
            parameters: ["--env", "${var.env}", "--entity_name", "opportunity", "--run_id", "opportunity_bronze_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 2
          min_retry_interval_millis: 300000
        - task_key: bronze_quote
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_bronze.py
            parameters: ["--env", "${var.env}", "--entity_name", "quote", "--run_id", "quote_bronze_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 2
          min_retry_interval_millis: 300000
        - task_key: bronze_contract
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_bronze.py
            parameters: ["--env", "${var.env}", "--entity_name", "contract", "--run_id", "contract_bronze_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 2
          min_retry_interval_millis: 300000
        - task_key: bronze_phonecall
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_bronze.py
            parameters: ["--env", "${var.env}", "--entity_name", "phonecall", "--run_id", "phonecall_bronze_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 2
          min_retry_interval_millis: 300000
        - task_key: bronze_appointment
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_bronze.py
            parameters: ["--env", "${var.env}", "--entity_name", "appointment", "--run_id", "appointment_bronze_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 2
          min_retry_interval_millis: 300000
        - task_key: silver_opportunity
          depends_on: [{task_key: bronze_opportunity}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_silver.py
            parameters: ["--env", "${var.env}", "--entity_name", "opportunity", "--run_id", "opportunity_silver_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 1
          min_retry_interval_millis: 300000
        - task_key: silver_quote
          depends_on: [{task_key: bronze_quote}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_silver.py
            parameters: ["--env", "${var.env}", "--entity_name", "quote", "--run_id", "quote_silver_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 1
          min_retry_interval_millis: 300000
        - task_key: silver_contract
          depends_on: [{task_key: bronze_contract}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_silver.py
            parameters: ["--env", "${var.env}", "--entity_name", "contract", "--run_id", "contract_silver_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 1
          min_retry_interval_millis: 300000
        - task_key: silver_phonecall
          depends_on: [{task_key: bronze_phonecall}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_silver.py
            parameters: ["--env", "${var.env}", "--entity_name", "phonecall", "--run_id", "phonecall_silver_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 1
          min_retry_interval_millis: 300000
        - task_key: silver_appointment
          depends_on: [{task_key: bronze_appointment}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_silver.py
            parameters: ["--env", "${var.env}", "--entity_name", "appointment", "--run_id", "appointment_silver_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
          max_retries: 1
          min_retry_interval_millis: 300000
        - task_key: gold_fact_opportunity
          depends_on: [{task_key: silver_opportunity}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_gold_fact.py
            parameters: ["--env", "${var.env}", "--entity_name", "opportunity", "--run_id", "opportunity_gold_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
        - task_key: gold_fact_quote
          depends_on: [{task_key: silver_quote}, {task_key: silver_opportunity}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_gold_quote.py
            parameters: ["--env", "${var.env}", "--entity_name", "quote", "--run_id", "quote_gold_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
        - task_key: gold_fact_contract
          depends_on: [{task_key: silver_contract}, {task_key: silver_quote}, {task_key: silver_opportunity}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_gold_contract.py
            parameters: ["--env", "${var.env}", "--entity_name", "contract", "--run_id", "contract_gold_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
        - task_key: gold_fact_activity
          depends_on: [{task_key: silver_phonecall}, {task_key: silver_appointment}, {task_key: silver_opportunity}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_gold_activity.py
            parameters: ["--env", "${var.env}", "--entity_name", "activity", "--run_id", "activity_gold_{{task.run_id}}", "--parent_run_id", "crm_current_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--project_root", "${var.project_root}"]
        - task_key: refresh_serving_views
          depends_on: [{task_key: gold_fact_opportunity}, {task_key: gold_fact_quote}, {task_key: gold_fact_contract}, {task_key: gold_fact_activity}]
          job_cluster_key: crm_pipeline_cluster
          spark_python_task:
            python_file: src/jobs/run_serving_views.py
            parameters: ["--env", "${var.env}", "--project_root", "${var.project_root}"]

    wf_crm_pipeline_snapshot:
      name: wf_crm_pipeline_snapshot_${bundle.target}
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 59 23 * * ?"
        timezone_id: "Asia/Kolkata"
        pause_status: PAUSED
      job_clusters:
        - job_cluster_key: crm_snapshot_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            autoscale:
              min_workers: 1
              max_workers: 4
      tasks:
        - task_key: gold_pipeline_snapshot
          job_cluster_key: crm_snapshot_cluster
          spark_python_task:
            python_file: src/jobs/run_snapshot.py
            parameters: ["--env", "${var.env}", "--entity_name", "opportunity", "--run_id", "pipeline_snapshot_{{task.run_id}}", "--parent_run_id", "crm_snapshot_{{job.run_id}}", "--trigger_type", "scheduled", "--attempt_no", "1", "--snapshot_ts", "{{job.start_time.iso_datetime}}", "--project_root", "${var.project_root}"]

    wf_crm_maintenance:
      name: wf_crm_maintenance_${bundle.target}
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: "Asia/Kolkata"
        pause_status: PAUSED
      job_clusters:
        - job_cluster_key: crm_maintenance_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 2
      tasks:
        - task_key: optimize_and_vacuum
          job_cluster_key: crm_maintenance_cluster
          spark_python_task:
            python_file: src/jobs/run_maintenance.py
            parameters: ["--catalog", "crm_${var.env}"]

targets:
  dev:
    mode: development
    variables:
      env: dev
      project_root: /Workspace/Repos/dev/crm-revenue-intelligence
  uat:
    mode: production
    variables:
      env: uat
      project_root: /Workspace/Repos/uat/crm-revenue-intelligence
  prod:
    mode: production
    variables:
      env: prod
      project_root: /Workspace/Repos/prod/crm-revenue-intelligence
